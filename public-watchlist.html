<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Theo Dõi Giá Cổ Phiếu – Đầu Tư Thông Minh Group</title>
  <meta name="description" content="Theo dõi giá cổ phiếu trực tuyến từ Đầu Tư Thông Minh Group. Cập nhật tự động mỗi 30 giây."/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08192E;--navy2:#0D2B52;--navy3:#1B4F8A;
  --gold:#C9A84C;--gold2:#E8C86A;
  --green:#1A7A4A;--green2:#E8F7EF;--green3:#2ECC71;
  --red:#C0392B;--red2:#FDECEA;
  --g1:#F2F4F7;--g2:#D4D8E1;--g3:#8A94A6;
  --text:#1A2438;--white:#FFFFFF;
  --ceil:#E74C3C;--floor:#2980B9;--ref:#E67E22;
}
html,body{font-family:'Be Vietnam Pro',sans-serif;background:var(--g1);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}

/* ── HEADER ── */
.site-header{background:var(--navy);border-bottom:3px solid var(--gold);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--white);}
.logo-sub{font-size:10px;color:var(--gold2);letter-spacing:.1em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:10px;}
.refresh-info{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.5);}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.rdot.ok{background:var(--green3);animation:blink 1.2s infinite;}
.rdot.loading{background:var(--gold2);animation:blink .6s infinite;}
.rdot.err{background:var(--ceil);animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.countdown{font-size:12px;font-weight:700;color:var(--gold2);}
.hbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:600;border:none;transition:all .18s;cursor:pointer;}
.hbtn-gold{background:var(--gold);color:var(--navy2);}
.hbtn-gold:hover{background:var(--gold2);}
.hbtn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.15);}
.hbtn-ghost:hover{background:rgba(255,255,255,.18);}

/* ── MARKET BAR ── */
.market-bar{background:var(--navy2);padding:9px 28px;display:flex;align-items:center;gap:20px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06);}
.market-bar::-webkit-scrollbar{height:3px;}
.market-bar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px;}
.mb-item{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.mb-name{font-size:11.5px;font-weight:700;color:var(--gold2);}
.mb-val{font-size:12px;font-weight:600;color:var(--white);}
.mb-chg{font-size:11.5px;font-weight:600;}
.mb-chg.up{color:var(--green3);}.mb-chg.dn{color:#E74C3C;}.mb-chg.nc{color:var(--ref);}
.mb-sep{width:1px;height:16px;background:rgba(255,255,255,.1);}

/* ── BODY ── */
.body{max-width:1300px;margin:0 auto;padding:20px 24px 60px;}

/* ── SUMMARY ── */
.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.sum-card{background:var(--white);border-radius:10px;padding:14px 16px;border:1.5px solid var(--g2);}
.sum-lbl{font-size:11px;color:var(--g3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.sum-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--navy2);}
.sum-sub{font-size:11.5px;color:var(--g3);margin-top:3px;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.wl-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--navy2);}
.wl-sub{font-size:13px;font-weight:400;color:var(--g3);}
.sort-row{display:flex;align-items:center;gap:7px;}
.sort-label{font-size:12px;color:var(--g3);}
.sort-btn{background:var(--g1);border:1.5px solid var(--g2);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;color:var(--g3);cursor:pointer;transition:all .15s;}
.sort-btn.active,.sort-btn:hover{background:var(--navy2);border-color:var(--navy2);color:var(--white);}

/* ── STOCK CARDS ── */
.wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px;}
.stock-card{background:var(--white);border-radius:11px;border:1.5px solid var(--g2);overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.stock-card:hover{border-color:var(--navy3);box-shadow:0 5px 20px rgba(13,43,82,.09);}
.stock-card.flash-up{animation:flashG .5s ease;}
.stock-card.flash-dn{animation:flashR .5s ease;}
@keyframes flashG{0%,100%{background:var(--white)}50%{background:#f0fdf4}}
@keyframes flashR{0%,100%{background:var(--white)}50%{background:#fff5f5}}
.card-topbar{height:3px;}
.card-topbar.up{background:linear-gradient(90deg,var(--green),var(--green3));}
.card-topbar.dn{background:linear-gradient(90deg,var(--red),#E74C3C);}
.card-topbar.nc{background:linear-gradient(90deg,var(--ref),#F39C12);}
.card-topbar.loading{background:var(--g2);}
.card-inner{padding:13px 14px 0;}
.card-r1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
.card-ticker{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--navy2);}
.card-co{font-size:11px;color:var(--g3);margin-top:1px;}
.card-exch{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:3px;background:#EBF2FC;color:var(--navy3);margin-top:3px;}
.price-row{display:flex;align-items:baseline;gap:9px;margin-bottom:5px;}
.price{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1;}
.price.up{color:var(--green);}.price.dn{color:var(--red);}.price.nc{color:var(--ref);}.price.ceil{color:var(--ceil);}.price.floor{color:var(--floor);}.price.loading{color:var(--g2);}
.chg-badge{font-size:12.5px;font-weight:700;padding:2px 7px;border-radius:4px;}
.chg-badge.up{background:var(--green2);color:var(--green);}
.chg-badge.dn{background:#FDECEA;color:var(--red);}
.chg-badge.nc{background:#FEF5E7;color:var(--ref);}
.levels-row{display:flex;gap:0;border:1px solid var(--g2);border-radius:5px;overflow:hidden;margin-bottom:7px;}
.lv{flex:1;text-align:center;padding:4px 3px;}
.lv:not(:last-child){border-right:1px solid var(--g2);}
.lv-lbl{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:1px;}
.lv-val{font-size:11.5px;font-weight:700;}
.lv.ref .lv-lbl,.lv.ref .lv-val{color:var(--ref);}
.lv.ceil .lv-lbl,.lv.ceil .lv-val{color:var(--ceil);}
.lv.floor .lv-lbl,.lv.floor .lv-val{color:var(--floor);}
.vol-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--g3);margin-bottom:7px;}
.vol-val{font-weight:600;color:var(--text);}
.warn-tag{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;}
.warn-ceil{background:#FDECEA;color:var(--ceil);}
.warn-floor{background:#EBF5FB;color:var(--floor);}
.card-chart{height:42px;margin:0 -14px;padding:0 6px;}
.card-chart svg{width:100%;height:100%;}
.card-ts{font-size:9.5px;color:var(--g3);padding:5px 14px;border-top:1px solid var(--g1);}
.card-err{padding:18px 14px;text-align:center;color:var(--red);font-size:13px;}
.skel{background:linear-gradient(90deg,var(--g2) 25%,var(--g1) 50%,var(--g2) 75%);background-size:200%;animation:shimmer 1.3s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* ── EMPTY / ERROR STATE ── */
.empty-wrap{text-align:center;padding:60px 24px;color:var(--g3);grid-column:1/-1;}
.empty-ico{font-size:44px;opacity:.3;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:600;color:var(--navy2);margin-bottom:6px;}
.empty-desc{font-size:14px;line-height:1.6;max-width:400px;margin:0 auto;}

/* ── SETUP NOTICE ── */
.setup-notice{background:var(--white);border-radius:12px;padding:32px;max-width:560px;margin:60px auto;text-align:center;border:1.5px solid var(--g2);box-shadow:0 8px 32px rgba(13,43,82,.08);}
.sn-ico{font-size:40px;margin-bottom:16px;}
.sn-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--navy2);margin-bottom:10px;}
.sn-desc{font-size:14px;color:var(--g3);line-height:1.65;margin-bottom:20px;}
.sn-code{background:var(--g1);border:1px solid var(--g2);border-radius:7px;padding:10px 14px;font-size:12.5px;color:var(--navy2);font-family:monospace;word-break:break-all;text-align:left;margin-bottom:16px;}

/* ── DISCLAIMER ── */
.disclaimer{background:rgba(230,126,34,.08);border:1px solid rgba(230,126,34,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ref);margin-bottom:20px;line-height:1.55;}

/* ── FOOTER ── */
.site-footer{background:var(--navy);border-top:2px solid var(--gold);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:40px;}
.footer-brand{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--white);}
.footer-links-row{display:flex;align-items:center;gap:16px;}
.footer-links-row a{font-size:12.5px;color:rgba(255,255,255,.55);transition:color .18s;}
.footer-links-row a:hover{color:var(--gold2);}
.footer-copy{font-size:11px;color:rgba(255,255,255,.3);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .site-header{padding:0 16px;}
  .market-bar{padding:8px 16px;}
  .body{padding:14px 14px 48px;}
  .sum-row{grid-template-columns:1fr 1fr;}
  .wl-grid{grid-template-columns:1fr;}
  .site-footer{flex-direction:column;align-items:flex-start;padding:16px 16px;}
  .header-right{gap:6px;}
  .refresh-info span:not(.countdown){display:none;}
}
@media(max-width:480px){.sum-row{grid-template-columns:1fr;}}
  </style>

<script>
'use strict';

const REFRESH_SEC = 30;
const BANDS = { HOSE:.07, HNX:.1, UPCOM:.15 };
const INDICES_CFG = [
  {id:'VNINDEX',name:'VN-Index'},
  {id:'HNXIndex',name:'HNX-Index'},
  {id:'VN30',name:'VN30'},
];
const SSI_BASE = 'https://fc-data.ssi.com.vn/api/v2/Market';
const RAW = 'https://raw.githubusercontent.com';

/* ─── STATE ─── */
let githubOwner='', githubRepo='', watchlist=[], live={}, prevPx={};
let ssiToken=null, ssiTokenExp=0;
let sortMode='custom', cdTimer=null, countdown=REFRESH_SEC;

/* ─── UTILS ─── */
const fN  = n=>n==null?'–':n.toLocaleString('vi-VN');
const fP  = n=>n==null?'–':(n>=0?'+':'')+n.toFixed(2)+'%';
const now_ = ()=>new Date().toLocaleTimeString('vi-VN');

/* ─── READ URL PARAMS ─── */
function getParams(){
  const p=new URLSearchParams(location.search);
  return {owner:p.get('owner')||'', repo:p.get('repo')||''};
}

/* ─── SSI TOKEN ─── */
async function ssiGetToken(cid,cs){
  if(ssiToken&&Date.now()<ssiTokenExp) return ssiToken;
  const r=await fetch(`${SSI_BASE}/AccessToken`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({consumerID:cid,consumerSecret:cs}),
    signal:AbortSignal.timeout(8000)
  });
  if(!r.ok) throw new Error(`SSI auth HTTP ${r.status}`);
  const d=await r.json();
  const tk=d?.data?.accessToken||d?.accessToken;
  if(!tk) throw new Error('SSI không trả về token');
  ssiToken=tk;ssiTokenExp=Date.now()+22*60*1000;
  return ssiToken;
}
async function ssiH(cid,cs){
  const tk=await ssiGetToken(cid,cs);
  return {Authorization:`Bearer ${tk}`,Accept:'application/json'};
}

/* ─── FETCH PRICE ─── */
async function fetchStock(sym,market,cid,cs){
  try{
    const h=await ssiH(cid,cs);
    const r=await fetch(`${SSI_BASE}/StockPrice?market=${market}&symbol=${sym}&pageIndex=1&pageSize=1`,
      {headers:h,signal:AbortSignal.timeout(7000)});
    if(!r.ok) return null;
    const d=await r.json();
    const it=d?.data?.[0];
    if(!it) return null;
    const price=it.StockPrice??it.currentPrice??it.matchPrice??it.lastPrice;
    const ref  =it.RefPrice??it.refPrice??it.referencePrice;
    const ceil_=it.CeilingPrice??it.ceilingPrice;
    const flr  =it.FloorPrice??it.floorPrice;
    const vol  =it.TradingVolume??it.tradingVolume??it.totalTradingVolume??0;
    const chg=price-ref, pct=ref?(chg/ref*100):0;
    return {price,ref,ceil:ceil_,floor:flr,change:chg,changePct:pct,vol};
  }catch(e){return null;}
}
async function fetchIntraday(sym,cid,cs){
  try{
    const h=await ssiH(cid,cs);
    const r=await fetch(`${SSI_BASE}/StockIntraday?symbol=${sym}&pageIndex=1&pageSize=100`,
      {headers:h,signal:AbortSignal.timeout(7000)});
    if(!r.ok) return [];
    const d=await r.json();
    const rows=d?.data||[];
    const step=Math.max(1,Math.floor(rows.length/50));
    return rows.filter((_,i)=>i%step===0).map(x=>x.p||x.price||x.Price||0).filter(Boolean);
  }catch(e){return [];}
}
async function fetchIndex(indexId,cid,cs){
  try{
    const h=await ssiH(cid,cs);
    const r=await fetch(`${SSI_BASE}/IndexIntraday?index=${indexId}&pageIndex=1&pageSize=5`,
      {headers:h,signal:AbortSignal.timeout(7000)});
    if(!r.ok) return null;
    const d=await r.json();
    const rows=d?.data||[];
    const last=rows[0]||rows[rows.length-1];
    if(!last) return null;
    const val=last.indexValue||last.IndexValue||last.value;
    const chg=last.change||last.Change||0;
    const pct=last.changePercent||last.ChangePercent||last.changePct||(val&&chg/val*100);
    return {val,chg,pct};
  }catch(e){return null;}
}

/* ─── MINI CHART ─── */
function miniSvg(pts,up){
  if(!pts||pts.length<2) return '<svg viewBox="0 0 300 42"></svg>';
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const W=300,H=42;
  const coords=pts.map((v,i)=>{
    const x=(i/(pts.length-1))*W;
    const y=H-((v-mn)/rng)*(H-5)-2.5;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const col=up===true?'var(--green3)':up===false?'#E74C3C':'var(--ref)';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g${up?'u':'d'}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="M${coords.split(' ').join(' L')} L${W},${H} L0,${H}Z" fill="url(#g${up?'u':'d'})"/>
    <polyline points="${coords}" stroke="${col}" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

/* ─── SUMMARY ─── */
function renderSummary(){
  let up=0,dn=0,nc=0;
  watchlist.forEach(s=>{
    const ld=live[s.ticker];
    if(!ld)return;
    if(ld.change>0)up++;else if(ld.change<0)dn++;else nc++;
  });
  return `<div class="sum-row">
    <div class="sum-card"><div class="sum-lbl">Tổng mã theo dõi</div><div class="sum-val">${watchlist.length}</div><div class="sum-sub">cổ phiếu</div></div>
    <div class="sum-card"><div class="sum-lbl">Tăng / Giảm / Tham chiếu</div><div class="sum-val"><span style="color:var(--green3)">${up}▲</span> / <span style="color:#E74C3C">${dn}▼</span> / <span style="color:var(--ref)">${nc}–</span></div><div class="sum-sub">hôm nay</div></div>
    <div class="sum-card"><div class="sum-lbl">Cập nhật lúc</div><div class="sum-val" style="font-size:18px;">${now_()}</div><div class="sum-sub">Nguồn: SSI FastConnect API</div></div>
  </div>`;
}

/* ─── RENDER GRID ─── */
function getSorted(){
  const l=[...watchlist];
  if(sortMode==='change_d') return l.sort((a,b)=>(live[b.ticker]?.changePct||0)-(live[a.ticker]?.changePct||0));
  if(sortMode==='change_a') return l.sort((a,b)=>(live[a.ticker]?.changePct||0)-(live[b.ticker]?.changePct||0));
  if(sortMode==='az')       return l.sort((a,b)=>a.ticker.localeCompare(b.ticker));
  return l;
}

function renderCards(){
  const sorted=getSorted();
  if(!sorted.length) return `<div class="empty-wrap"><div class="empty-ico">📋</div><div class="empty-title">Chưa có mã nào</div><div class="empty-desc">Admin chưa thêm cổ phiếu vào danh sách.</div></div>`;
  return `<div class="wl-grid">${sorted.map(s=>{
    const ld=live[s.ticker];
    if(!ld) return `<div class="stock-card"><div class="card-topbar loading"></div><div class="card-inner"><div class="card-r1"><div><div class="card-ticker">${s.ticker}</div></div></div><div class="card-err">Đang tải...</div></div></div>`;
    const {price,ref,ceil,floor,change,changePct,vol,intraday}=ld;
    const up=change>0?true:change<0?false:null;
    const cls=up===true?'up':up===false?'dn':'nc';
    const isCeil=ceil&&Math.abs(price-ceil)<ceil*0.001;
    const isFloor=floor&&Math.abs(price-floor)<floor*0.001;
    const priceCls=isCeil?'ceil':isFloor?'floor':cls;
    const band=BANDS[s.exchange||'HOSE'];
    const flash=prevPx[s.ticker]&&price>prevPx[s.ticker]?' flash-up':prevPx[s.ticker]&&price<prevPx[s.ticker]?' flash-dn':'';
    const arrow=change>0?'▲':change<0?'▼':'–';
    return `
    <div class="stock-card${flash}">
      <div class="card-topbar ${cls}"></div>
      <div class="card-inner">
        <div class="card-r1">
          <div>
            <div class="card-ticker">${s.ticker}</div>
            ${s.name?`<div class="card-co">${s.name}</div>`:''}
            <div class="card-exch">${s.exchange||'HOSE'} ±${(band*100).toFixed(0)}%</div>
          </div>
        </div>
        <div class="price-row">
          <span class="price ${priceCls}">${fN(price)}</span>
          <span class="chg-badge ${cls}">${arrow} ${fP(changePct)}</span>
          ${isCeil?'<span class="warn-tag warn-ceil">TRẦN</span>':isFloor?'<span class="warn-tag warn-floor">SÀN</span>':''}
        </div>
        <div class="levels-row">
          <div class="lv ref"><div class="lv-lbl">Tham chiếu</div><div class="lv-val">${fN(ref)}</div></div>
          <div class="lv ceil"><div class="lv-lbl">Trần</div><div class="lv-val">${fN(ceil)}</div></div>
          <div class="lv floor"><div class="lv-lbl">Sàn</div><div class="lv-val">${fN(floor)}</div></div>
        </div>
        <div class="vol-row">
          <span>Khối lượng</span>
          <span class="vol-val">${vol>=1e6?(vol/1e6).toFixed(2)+'M':vol>=1000?(vol/1000).toFixed(1)+'K':fN(vol)}</span>
        </div>
      </div>
      <div class="card-chart">${miniSvg(intraday,up)}</div>
      <div class="card-ts">Cập nhật lúc ${now_()}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderPage(){
  const body=document.getElementById('main-body');
  body.innerHTML=`
    ${renderSummary()}
    <div class="disclaimer">⚠ Dữ liệu giá chỉ mang tính chất tham khảo, không phải khuyến nghị mua/bán. Nhà đầu tư tự chịu trách nhiệm với quyết định giao dịch của mình.</div>
    <div class="toolbar">
      <div><span class="wl-title">Danh sách theo dõi</span> <span class="wl-sub">· ${watchlist.length} mã · Cập nhật tự động mỗi 30 giây</span></div>
      <div class="sort-row">
        <span class="sort-label">Sắp xếp:</span>
        <button class="sort-btn ${sortMode==='custom'?'active':''}" onclick="setSort('custom')">Mặc định</button>
        <button class="sort-btn ${sortMode==='change_d'?'active':''}" onclick="setSort('change_d')">%▼</button>
        <button class="sort-btn ${sortMode==='change_a'?'active':''}" onclick="setSort('change_a')">%▲</button>
        <button class="sort-btn ${sortMode==='az'?'active':''}" onclick="setSort('az')">A–Z</button>
      </div>
    </div>
    ${renderCards()}
  `;
}

function setSort(m){sortMode=m;renderPage();}

/* ─── REFRESH ─── */
async function refreshAll(cid,cs){
  setDot('loading');
  if(!watchlist.length){setDot('ok');return;}
  prevPx={...Object.fromEntries(Object.entries(live).map(([k,v])=>[k,v?.price]))};
  const pRes=await Promise.allSettled(watchlist.map(s=>fetchStock(s.ticker,s.exchange||'HOSE',cid,cs)));
  const cRes=await Promise.allSettled(watchlist.map(s=>fetchIntraday(s.ticker,cid,cs)));
  watchlist.forEach((s,i)=>{
    if(pRes[i].status==='fulfilled'&&pRes[i].value){
      const intraday=cRes[i].status==='fulfilled'?cRes[i].value:[];
      live[s.ticker]={...pRes[i].value,intraday};
    }
  });
  renderPage();
  // Indices
  const iRes=await Promise.allSettled(INDICES_CFG.map(x=>fetchIndex(x.id,cid,cs)));
  const bar=document.getElementById('market-bar');
  bar.innerHTML=INDICES_CFG.map((idx,i)=>{
    if(iRes[i].status!=='fulfilled'||!iRes[i].value) return `<div class="mb-item"><span class="mb-name">${idx.name}</span><span class="mb-val" style="color:var(--g3)">–</span></div>`;
    const {val,chg,pct}=iRes[i].value;
    const cls=chg>0?'up':chg<0?'dn':'nc';
    return `<div class="mb-item"><span class="mb-name">${idx.name}</span><span class="mb-val">${fN(Math.round((val||0)*100)/100)}</span><span class="mb-chg ${cls}">${chg>0?'▲':'▼'} ${fP(pct)}</span></div>`;
  }).join('<div class="mb-sep"></div>');
  setDot('ok');
}

let _cid='',_cs='';
function forceRefresh(){clearInterval(cdTimer);countdown=REFRESH_SEC;document.getElementById('countdown').textContent=REFRESH_SEC;refreshAll(_cid,_cs).then(startCd);}
function startCd(){
  clearInterval(cdTimer);countdown=REFRESH_SEC;
  cdTimer=setInterval(()=>{
    countdown--;document.getElementById('countdown').textContent=countdown;
    if(countdown<=0){countdown=REFRESH_SEC;refreshAll(_cid,_cs);}
  },1000);
}
function setDot(s){const d=document.getElementById('rdot');d.className='rdot '+(s==='loading'?'loading':s==='err'?'err':'ok');}

/* ─── INIT ─── */
async function init(){
  const {owner,repo}=getParams();
  if(!owner||!repo){
    document.getElementById('main-body').innerHTML=`
      <div class="setup-notice">
        <div class="sn-ico">🔗</div>
        <div class="sn-title">Thiếu tham số truy cập</div>
        <div class="sn-desc">Trang này cần được mở bằng link đầy đủ do Admin cung cấp. Nếu anh là Admin, vào trang <strong>watchlist.html</strong> → Cài đặt → Sao chép link Public Page.</div>
        <div class="sn-code">/public-watchlist.html?owner=github-username&repo=ten-repository</div>
        <a href="/watchlist.html" style="display:inline-block;margin-top:4px;padding:9px 20px;background:var(--navy2);color:var(--white);border-radius:7px;font-size:14px;font-weight:700;">Vào trang Admin</a>
      </div>`;
    return;
  }
  githubOwner=owner; githubRepo=repo;
  // Load from GitHub raw
  try{
    const [wlRes,cfgRes]=await Promise.allSettled([
      fetch(`${RAW}/${owner}/${repo}/main/watchlist.json`).then(r=>r.ok?r.json():Promise.reject('watchlist not found')),
      fetch(`${RAW}/${owner}/${repo}/main/ssi-config.json`).then(r=>r.ok?r.json():Promise.reject('ssi-config not found'))
    ]);
    if(wlRes.status!=='fulfilled') throw new Error('Không tải được watchlist.json từ GitHub');
    if(cfgRes.status!=='fulfilled') throw new Error('Không tải được ssi-config.json. Admin cần cấu hình SSI API trong trang Cài đặt.');
    watchlist=wlRes.value;
    const ssiCfg=cfgRes.value;
    if(!ssiCfg.consumerID||!ssiCfg.consumerSecret) throw new Error('SSI API chưa được cấu hình. Admin vui lòng vào Cài đặt → Lưu SSI config.');
    _cid=ssiCfg.consumerID; _cs=ssiCfg.consumerSecret;
    // Render skeleton first
    document.getElementById('main-body').innerHTML=`
      ${renderSummary()}
      <div class="toolbar"><span class="wl-title">Danh sách theo dõi</span></div>
      <div class="wl-grid">${watchlist.map(s=>`
        <div class="stock-card">
          <div class="card-topbar loading"></div>
          <div class="card-inner"><div class="card-r1"><div><div class="card-ticker">${s.ticker}</div></div></div>
          <div class="skel" style="height:26px;width:130px;margin-bottom:8px;"></div>
          <div class="skel" style="height:33px;border-radius:5px;margin-bottom:7px;"></div>
          <div class="skel" style="height:42px;border-radius:4px;"></div>
        </div></div>`).join('')}
      </div>`;
    await refreshAll(_cid,_cs);
    startCd();
  }catch(e){
    document.getElementById('main-body').innerHTML=`
      <div class="setup-notice">
        <div class="sn-ico">⚠️</div>
        <div class="sn-title">Không thể tải dữ liệu</div>
        <div class="sn-desc">${e.message}</div>
        <button onclick="init()" style="margin-top:16px;padding:9px 20px;background:var(--navy2);color:var(--white);border-radius:7px;font-size:14px;font-weight:700;border:none;cursor:pointer;">Thử lại</button>
      </div>`;
    setDot('err');
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
