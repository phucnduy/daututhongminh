<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danh mục Đầu tư – Đầu Tư Thông Minh Group</title>
  <meta name="description" content="Danh mục đầu tư cổ phiếu từ Đầu Tư Thông Minh Group."/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08192E;--navy2:#0D2B52;--navy3:#1B4F8A;
  --gold:#C9A84C;--gold2:#E8C86A;
  --green:#1A7A4A;--green2:#E8F7EF;--green3:#2ECC71;
  --red:#C0392B;--red2:#FDECEA;
  --g1:#F2F4F7;--g2:#D4D8E1;--g3:#8A94A6;
  --text:#1A2438;--white:#FFFFFF;
  --ceil:#E74C3C;--floor:#2980B9;--ref:#E67E22;
}
html,body{font-family:'Be Vietnam Pro',sans-serif;background:var(--g1);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
.site-header{background:var(--navy);border-bottom:3px solid var(--gold);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--white);}
.logo-sub{font-size:10px;color:var(--gold2);letter-spacing:.1em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:10px;}
.price-info{font-size:12px;color:rgba(255,255,255,.5);}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--green3);display:inline-block;margin-right:5px;}
.pdot.stale{background:var(--gold2);}
.hbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:600;border:none;transition:all .18s;cursor:pointer;}
.hbtn-gold{background:var(--gold);color:var(--navy2);}
.hbtn-gold:hover{background:var(--gold2);}
.hbtn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.15);}
.hbtn-ghost:hover{background:rgba(255,255,255,.18);}
.body{max-width:1400px;margin:0 auto;padding:20px 24px 60px;}
/* NAV CARDS */
.nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.nav-card{background:var(--white);border-radius:10px;padding:14px 16px;border:1.5px solid var(--g2);}
.nav-card.highlight{border-color:var(--gold);background:linear-gradient(135deg,var(--navy2),#1a3a6e);}
.nav-lbl{font-size:11px;font-weight:500;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.nav-card.highlight .nav-lbl{color:rgba(255,255,255,.55);}
.nav-val{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--navy2);line-height:1;}
.nav-card.highlight .nav-val{color:var(--gold2);font-size:22px;}
.nav-sub{font-size:11.5px;color:var(--g3);margin-top:4px;}
.nav-card.highlight .nav-sub{color:rgba(255,255,255,.4);}
.nav-val.profit{color:var(--green);}
.nav-val.loss{color:var(--red);}
.nav-val.nc{color:var(--g3);}
/* SECTION */
.sec-card{background:var(--white);border-radius:12px;border:1.5px solid var(--g2);margin-bottom:20px;overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--g2);}
.sec-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--navy2);}
/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--g1);text-align:left;padding:9px 12px;font-size:11px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
td{padding:11px 12px;border-bottom:1px solid var(--g1);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFBFC;}
.ticker-cell{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--navy2);}
.exchange-tag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 5px;border-radius:3px;background:#EBF2FC;color:var(--navy3);margin-left:4px;}
.up-cell{color:var(--green);font-weight:700;}
.dn-cell{color:var(--red);font-weight:700;}
.nc-cell{color:var(--ref);font-weight:700;}
.alloc-bar{height:6px;background:var(--g2);border-radius:3px;margin-top:4px;overflow:hidden;}
.alloc-fill{height:100%;background:linear-gradient(90deg,var(--navy2),var(--navy3));border-radius:3px;}
.empty-row td{text-align:center;color:var(--g3);padding:32px;font-size:13.5px;}
/* SETUP */
.setup-notice{background:var(--white);border-radius:12px;padding:32px;max-width:560px;margin:60px auto;text-align:center;border:1.5px solid var(--g2);}
.sn-ico{font-size:40px;margin-bottom:16px;}
.sn-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--navy2);margin-bottom:10px;}
.sn-desc{font-size:14px;color:var(--g3);line-height:1.65;margin-bottom:20px;}
/* DISCLAIMER */
.disclaimer{background:rgba(230,126,34,.08);border:1px solid rgba(230,126,34,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ref);margin-bottom:20px;line-height:1.55;}
/* FOOTER */
.site-footer{background:var(--navy);border-top:2px solid var(--gold);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:40px;}
.footer-brand{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--white);}
.footer-links{display:flex;align-items:center;gap:16px;}
.footer-links a{font-size:12.5px;color:rgba(255,255,255,.55);transition:color .18s;}
.footer-links a:hover{color:var(--gold2);}
.footer-copy{font-size:11px;color:rgba(255,255,255,.3);}
@media(max-width:1024px){.nav-grid{grid-template-columns:repeat(3,1fr);};}
@media(max-width:768px){.site-header{padding:0 16px;}.body{padding:14px 14px 48px;}.nav-grid{grid-template-columns:1fr 1fr;}.header-right .price-info{display:none;};}
@media(max-width:480px){.nav-grid{grid-template-columns:1fr;};}
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="logo">
    <div class="logo-mark"><svg width="16" height="16" viewBox="0 0 22 22" fill="none"><polyline points="2,16 7,9 12,12 17,5 20,8" stroke="#08192E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><div class="logo-name">Danh mục Đầu tư</div><div class="logo-sub">Đầu Tư Thông Minh Group</div></div>
  </a>
  <div class="header-right">
    <span class="price-info"><span class="pdot" id="pdot"></span><span id="price-date">Đang tải giá...</span></span>
    <button class="hbtn hbtn-ghost" onclick="refreshPrices()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Cập nhật giá
    </button>
    <a href="/" class="hbtn hbtn-gold">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Trang chủ
    </a>
  </div>
</header>

<div class="body" id="main-body">
  <div class="setup-notice">
    <div class="sn-ico">⏳</div>
    <div class="sn-title">Đang tải dữ liệu...</div>
    <div class="sn-desc">Đang kết nối SSI API và tải thông tin danh mục.</div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-brand">Đầu Tư Thông Minh Group</div>
  <div class="footer-links">
    <a href="https://zalo.me/g/sxshix010" target="_blank" rel="noopener">Nhóm Zalo</a>
    <a href="https://www.facebook.com/Smart.Investing.VN" target="_blank" rel="noopener">Facebook</a>
    <a href="/">Báo cáo phân tích</a>
  </div>
  <div class="footer-copy">Dữ liệu giá từ SSI FastConnect · Chỉ mang tính tham khảo</div>
</footer>

<script>
'use strict';
const GITHUB_OWNER='phucnduy', GITHUB_REPO='daututhongminh';
const RAW=`https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main`;
const SSI_BASE='https://fc-data.ssi.com.vn/api/v2/Market';

let portfolio=null, liveData={};
let ssiToken=null, ssiTokenExp=0;

const fN=n=>n==null?'–':Math.round(n).toLocaleString('vi-VN');
const fP=(n,d=2)=>n==null?'–':(n>=0?'+':'')+n.toFixed(d)+'%';
const fDate=d=>d?d.split('-').reverse().join('/'):'';

async function ssiGetToken(cid,cs){
  if(ssiToken&&Date.now()<ssiTokenExp)return ssiToken;
  const r=await fetch(`${SSI_BASE}/AccessToken`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({consumerID:cid,consumerSecret:cs}),signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw new Error(`SSI auth ${r.status}`);
  const d=await r.json();
  const tk=d?.data?.accessToken||d?.accessToken;
  if(!tk)throw new Error('Không nhận được token SSI');
  ssiToken=tk;ssiTokenExp=Date.now()+22*60*1000;
  return ssiToken;
}

async function fetchDailyPrice(ticker, exchange, cid, cs){
  try{
    const tk=await ssiGetToken(cid,cs);
    const d=new Date(); d.setDate(d.getDate()-5);
    const from=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    const today=`${String(new Date().getDate()).padStart(2,'0')}/${String(new Date().getMonth()+1).padStart(2,'0')}/${new Date().getFullYear()}`;
    const r=await fetch(`${SSI_BASE}/DailyStockPrice?symbol=${ticker}&market=${exchange}&fromDate=${from}&toDate=${today}&pageIndex=1&pageSize=5&ascending=false`,
      {headers:{Authorization:`Bearer ${tk}`,Accept:'application/json'},signal:AbortSignal.timeout(7000)});
    if(!r.ok)return null;
    const data=await r.json();
    if(!data?.data?.length)return null;
    const row=data.data[0];
    return{price:parseFloat(row.ClosePrice)||0,ref:parseFloat(row.RefPrice)||0,ceil:parseFloat(row.CeilingPrice)||0,floor:parseFloat(row.FloorPrice)||0,change:parseFloat(row.PriceChange)||0,changePct:parseFloat(row.PerPriceChange)||0,vol:parseFloat(row.TotalTradedVol)||0,date:row.TradingDate};
  }catch(e){return null;}
}

async function refreshPrices(){
  if(!portfolio?.holdings?.length)return;
  const ssiCfg=await fetch(`${RAW}/ssi-config.json`).then(r=>r.ok?r.json():null).catch(()=>null);
  if(!ssiCfg?.consumerID){document.getElementById('price-date').textContent='Chưa cấu hình SSI API';return;}
  document.getElementById('pdot').className='pdot stale';
  document.getElementById('price-date').textContent='Đang tải giá...';
  await Promise.allSettled(portfolio.holdings.map(h=>fetchDailyPrice(h.ticker,h.exchange||'HOSE',ssiCfg.consumerID,ssiCfg.consumerSecret).then(d=>{if(d)liveData[h.ticker]=d;})));
  const dates=Object.values(liveData).map(x=>x.date).filter(Boolean);
  document.getElementById('pdot').className='pdot';
  document.getElementById('price-date').textContent=dates.length?`Giá đóng cửa ${dates[0]}`:'Không có dữ liệu';
  renderAll();
}

function calcNAV(){
  if(!portfolio)return{nav:0,stockVal:0,unrealized:0,realized:0};
  let stockVal=0,unrealized=0;
  (portfolio.holdings||[]).forEach(h=>{
    const ld=liveData[h.ticker];
    const price=ld?.price||h.avgCost;
    stockVal+=price*h.qty;
    unrealized+=(price-h.avgCost)*h.qty;
  });
  const realized=(portfolio.closedPositions||[]).reduce((s,p)=>s+(p.realizedPnL||0),0);
  return{nav:(portfolio.cash||0)+stockVal+realized,stockVal,unrealized,realized};
}

function renderSummary(){
  const{nav,stockVal,unrealized,realized}=calcNAV();
  const init=portfolio.initialCash||0;
  const ret=init?((nav-init)/init*100):0;
  const cash=portfolio.cash||0;
  const retCls=ret>0?'profit':ret<0?'loss':'nc';
  return `<div class="nav-grid">
    <div class="nav-card highlight">
      <div class="nav-lbl">Tổng NAV Quỹ</div>
      <div class="nav-val">${fN(nav)} đ</div>
      <div class="nav-sub">Lợi nhuận: <strong style="color:var(--${ret>=0?'green3':'ceil'})">${fN(nav-init)} đ (${fP(ret)})</strong></div>
    </div>
    <div class="nav-card"><div class="nav-lbl">Vốn ban đầu</div><div class="nav-val">${fN(init)} đ</div><div class="nav-sub">Tiền đầu tư ban đầu</div></div>
    <div class="nav-card"><div class="nav-lbl">Tiền mặt còn lại</div><div class="nav-val">${fN(cash)} đ</div><div class="nav-sub">${nav?((cash/nav)*100).toFixed(1):0}% tổng NAV</div></div>
    <div class="nav-card"><div class="nav-lbl">Giá trị CP đang nắm</div><div class="nav-val">${fN(stockVal)} đ</div><div class="nav-sub">L/L chưa TH: <span class="${unrealized>=0?'up-cell':'dn-cell'}">${fN(unrealized)} đ</span></div></div>
    <div class="nav-card"><div class="nav-lbl">Lãi/Lỗ đã thực hiện</div><div class="nav-val ${realized>0?'profit':realized<0?'loss':'nc'}">${fN(realized)} đ</div><div class="nav-sub">${(portfolio.closedPositions||[]).length} vị thế đã đóng</div></div>
  </div>`;
}

function renderHoldings(){
  const holdings=portfolio.holdings||[];
  const{nav}=calcNAV();
  if(!holdings.length)return`<div class="empty-row" style="text-align:center;padding:32px;color:var(--g3)">Chưa có cổ phiếu nào trong danh mục</div>`;
  return`<div class="sec-card">
    <div class="sec-head"><span class="sec-title">📊 Danh mục đang nắm giữ · ${holdings.length} mã</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Mã CK</th><th>Sàn</th>
        <th style="text-align:right">Giá TB mua</th>
        <th style="text-align:right">KL</th>
        <th style="text-align:right">Giá hiện tại</th>
        <th style="text-align:right">Tăng/Giảm hôm nay</th>
        <th style="text-align:right">Giá trị</th>
        <th style="text-align:right">Lãi/Lỗ chưa TH</th>
        <th style="text-align:right">% L/L</th>
        <th style="text-align:right">% NAV</th>
        <th style="text-align:right">KL giao dịch</th>
        <th style="text-align:right">Trần / Sàn</th>
      </tr></thead>
      <tbody>
      ${holdings.map(h=>{
        const ld=liveData[h.ticker];
        const price=ld?.price||null;
        const val=price?price*h.qty:h.avgCost*h.qty;
        const pnl=price?(price-h.avgCost)*h.qty:null;
        const pnlPct=price?((price-h.avgCost)/h.avgCost*100):null;
        const navPct=nav&&price?(val/nav*100):null;
        const cls=ld?.change>0?'up-cell':ld?.change<0?'dn-cell':'nc-cell';
        const pnlCls=pnl>0?'up-cell':pnl<0?'dn-cell':'nc-cell';
        const arrow=ld?.change>0?'▲':ld?.change<0?'▼':'–';
        return`<tr>
          <td><span class="ticker-cell">${h.ticker}</span></td>
          <td><span class="exchange-tag">${h.exchange||'HOSE'}</span></td>
          <td style="text-align:right">${fN(h.avgCost)}</td>
          <td style="text-align:right">${fN(h.qty)}</td>
          <td style="text-align:right;font-weight:700">${price?fN(price):'–'}</td>
          <td style="text-align:right" class="${cls}">${ld?`${arrow} ${fN(ld.change)} (${fP(ld.changePct)})`:'–'}</td>
          <td style="text-align:right;font-weight:600">${fN(val)} đ</td>
          <td style="text-align:right" class="${pnlCls}">${pnl!=null?fN(pnl)+' đ':'–'}</td>
          <td style="text-align:right" class="${pnlCls}">${pnlPct!=null?fP(pnlPct):'–'}</td>
          <td style="text-align:right">${navPct!=null?`${navPct.toFixed(1)}%<div class="alloc-bar"><div class="alloc-fill" style="width:${Math.min(navPct,100)}%"></div></div>`:'–'}</td>
          <td style="text-align:right">${ld?fN(ld.vol):'–'}</td>
          <td style="text-align:right;font-size:11.5px">${ld?`<span style="color:var(--ceil)">${fN(ld.ceil)}</span> / <span style="color:var(--floor)">${fN(ld.floor)}</span>`:'–'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function renderClosed(){
  const closed=portfolio.closedPositions||[];
  if(!closed.length)return'';
  const sorted=[...closed].sort((a,b)=>b.closeDate?.localeCompare(a.closeDate||'')||0);
  return`<div class="sec-card">
    <div class="sec-head"><span class="sec-title">✅ Lãi/Lỗ đã thực hiện · ${closed.length} vị thế</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Mã CK</th>
        <th style="text-align:right">Giá TB mua</th>
        <th style="text-align:right">Giá TB bán</th>
        <th style="text-align:right">KL</th>
        <th style="text-align:right">Vốn bỏ ra</th>
        <th style="text-align:right">Tiền thu về</th>
        <th style="text-align:right">Lãi/Lỗ</th>
        <th style="text-align:right">% L/L</th>
        <th>Ngày mua</th>
        <th>Ngày đóng</th>
      </tr></thead>
      <tbody>
      ${sorted.map(p=>{
        const pnlCls=p.realizedPnL>0?'up-cell':p.realizedPnL<0?'dn-cell':'';
        const pct=p.avgBuy?((p.avgSell-p.avgBuy)/p.avgBuy*100):null;
        return`<tr>
          <td><span class="ticker-cell">${p.ticker}</span> <span class="exchange-tag">${p.exchange||'HOSE'}</span></td>
          <td style="text-align:right">${fN(p.avgBuy)}</td>
          <td style="text-align:right">${fN(p.avgSell)}</td>
          <td style="text-align:right">${fN(p.qty)}</td>
          <td style="text-align:right">${fN((p.avgBuy||0)*p.qty)} đ</td>
          <td style="text-align:right">${fN((p.avgSell||0)*p.qty)} đ</td>
          <td style="text-align:right" class="${pnlCls}">${fN(p.realizedPnL)} đ</td>
          <td style="text-align:right" class="${pnlCls}">${pct!=null?fP(pct):'–'}</td>
          <td>${fDate(p.buyDate)||'–'}</td>
          <td>${fDate(p.closeDate)||'–'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function renderAll(){
  const body=document.getElementById('main-body');
  body.innerHTML=`
    ${renderSummary()}
    <div class="disclaimer">⚠ Dữ liệu giá đóng cửa từ SSI FastConnect API · Cập nhật sau mỗi phiên giao dịch · Chỉ mang tính tham khảo</div>
    ${renderHoldings()}
    ${renderClosed()}
  `;
}

async function init(){
  try{
    const [pfRes, cfgRes]=await Promise.allSettled([
      fetch(`${RAW}/portfolio.json`).then(r=>r.ok?r.json():Promise.reject('portfolio not found')),
      fetch(`${RAW}/ssi-config.json`).then(r=>r.ok?r.json():Promise.reject('ssi-config not found'))
    ]);
    if(pfRes.status!=='fulfilled') throw new Error('Không tải được portfolio.json từ GitHub.');
    portfolio=pfRes.value;
    renderAll();
    if(cfgRes.status==='fulfilled'&&cfgRes.value?.consumerID&&portfolio.holdings?.length){
      const ssiCfg=cfgRes.value;
      document.getElementById('pdot').className='pdot stale';
      document.getElementById('price-date').textContent='Đang tải giá...';
      await Promise.allSettled(portfolio.holdings.map(h=>
        fetchDailyPrice(h.ticker,h.exchange||'HOSE',ssiCfg.consumerID,ssiCfg.consumerSecret).then(d=>{if(d)liveData[h.ticker]=d;})
      ));
      const dates=Object.values(liveData).map(x=>x.date).filter(Boolean);
      document.getElementById('pdot').className='pdot';
      document.getElementById('price-date').textContent=dates.length?`Giá đóng cửa ${dates[0]}`:'Không có dữ liệu';
      renderAll();
    }else{
      document.getElementById('price-date').textContent='Chưa cấu hình giá';
    }
  }catch(e){
    document.getElementById('main-body').innerHTML=`
      <div class="setup-notice">
        <div class="sn-ico">⚠️</div>
        <div class="sn-title">Không thể tải dữ liệu</div>
        <div class="sn-desc">${e.message}</div>
        <button onclick="init()" style="margin-top:16px;padding:9px 20px;background:var(--navy2);color:var(--white);border-radius:7px;font-size:14px;font-weight:700;border:none;cursor:pointer;">Thử lại</button>
      </div>`;
  }
}

window.addEventListener('DOMContentLoaded',init);
</script>
